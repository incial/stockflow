spring:
  application:
    name: stockflow

  # ===========================
  # DATASOURCE (POSTGRES + HIKARI)
  # ===========================
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver

    hikari:
      pool-name: StockflowHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 60000
      max-lifetime: 300000
      validation-timeout: 5000
      auto-commit: false

  # ===========================
  # JPA / HIBERNATE
  # ===========================
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: false
        format_sql: false
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
        generate_statistics: false

  # ===========================
  # MAIL
  # ===========================
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp:
        auth: true
        starttls.enable: true
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

# ===========================
# GOOGLE OAUTH
# ===========================
google:
  client:
    id: ${GOOGLE_CLIENT_ID}

# ===========================
# JWT
# ===========================
jwt:
  secret: ${JWT_SECRET}

# ===========================
# SERVER
# ===========================
server:
  port: ${SERVER_PORT:8080}

  compression:
    enabled: true
    mime-types: >
      application/json,
      application/xml,
      text/html,
      text/plain,
      text/css,
      application/javascript
  tomcat:
    accept-count: 100
    threads:
      max: 40
      min-spare: 5

# ===========================
# LOGGING (PROD-SAFE)
# ===========================
logging:
  level:
    root: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
    com.incial.stockflow: INFO

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"

# ===========================
# ACTUATOR
# ===========================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    defaults:
      enabled: true

# ===========================
# ENV PRINTER (SAFE)
# ===========================
env:
  printer:
    enabled: true
    endpoint-enabled: false
